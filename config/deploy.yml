# Kamal deployment for rbrun (the dummy host app) onto a single Hetzner box.
# Runtime-varying values (the freshly-provisioned server IP, the registry) come from the environment via
# ERB — bin/deploy resolves them and exports them before invoking kamal. Re-running is idempotent.

service: rbrun

# rbrun is an engine; what we deploy is its dummy host app — a pure dev environment. Hence rbrun-dev.
# Namespace defaults to the registry username; the image name is overridable but defaults to rbrun-dev.
image: <%= ENV.fetch("KAMAL_IMAGE_NAMESPACE") { ENV.fetch("KAMAL_REGISTRY_USERNAME") } %>/<%= ENV.fetch("KAMAL_IMAGE_NAME", "rbrun-dev") %>

servers:
  web:
    - <%= ENV.fetch("DEPLOY_SERVER_IP") %>

# kamal-proxy terminates TLS with Let's Encrypt for the app host and forwards HTTP to the container.
# The host resolves DNS-only (grey) to this box, so the HTTP-01 challenge reaches the proxy directly.
proxy:
  ssl: true
  host: <%= ENV.fetch("RBRUN_APP_HOST", "dev.rb.run") %>
  app_port: 3000
  healthcheck:
    path: /up
    interval: 3
    timeout: 30

registry:
  server: <%= ENV.fetch("KAMAL_REGISTRY_SERVER", "ghcr.io") %>
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Cross-build amd64 (the Hetzner box) — on an arm64 laptop Kamal drives buildx emulation.
builder:
  arch: amd64

ssh:
  user: root
  keys:
    - <%= ENV.fetch("DEPLOY_SSH_KEY", ".deploy/id_ed25519") %>

env:
  clear:
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    # Previews: the record is <token>-preview.<domain>; the target is THIS app's own public origin (the
    # box), never a tunnel. Each preview host CNAMEs here so requests land back on the proxy.
    RBRUN_PREVIEW_DOMAIN: <%= ENV.fetch("RBRUN_PREVIEW_DOMAIN", "rb.run") %>
    RBRUN_PREVIEW_TARGET: <%= ENV.fetch("RBRUN_APP_HOST", "dev.rb.run") %>
    DAYTONA_API_URL: <%= ENV.fetch("DAYTONA_API_URL", "https://app.daytona.io/api") %>
  secret:
    - SECRET_KEY_BASE
    - DAYTONA_API_KEY
    - CLOUDFLARE_API_KEY
    - CLOUDFLARE_ZONE_ID
    - ANTHROPIC_OAUTH_TOKEN

# The sqlite DB persists across deploys on a named volume mounted at the dummy app's storage dir
# (Rails.root is test/dummy, so this is where storage/production.sqlite3 lands).
volumes:
  - "rbrun_storage:/rails/test/dummy/storage"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole"
